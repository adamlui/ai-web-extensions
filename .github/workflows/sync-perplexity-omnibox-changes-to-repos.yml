name: Sync perplexity-omnibox/ to KudoAI/perplexity-omnibox/

on:
  push:
    branches: [main]
    paths: [perplexity-omnibox/**]

concurrency:
  group: sync-changes-to-repos

jobs:
  build:
    if: (github.repository == 'adamlui/ai-web-extensions') && !contains(github.event.head_commit.message, '[auto-sync')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      TZ: PST8PDT

    steps:

      - name: Checkout adamlui/ai-web-extensions
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          path: adamlui/ai-web-extensions

      - name: Checkout KudoAI/perplexity-omnibox
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.REPO_SYNC_PAT }}
          repository: KudoAI/perplexity-omnibox
          path: KudoAI/perplexity-omnibox

      - name: Sync perplexity-omnibox/ to KudoAI/perplexity-omnibox/
        run: |
          rsync -avhc --delete --filter='P /.*' \
            ${{ github.workspace }}/adamlui/ai-web-extensions/perplexity-omnibox/ \
            ${{ github.workspace }}/KudoAI/perplexity-omnibox/

      - name: Escape backticks in commit msg
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          DELIM="EOF_$(uuidgen)"
          echo "ESCAPED_MSG<<$DELIM" >> "$GITHUB_ENV"
          echo "$COMMIT_MSG" | sed 's/`/\`/g' >> "$GITHUB_ENV"
          echo "$DELIM" >> "$GITHUB_ENV"

      - name: Config committer
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_ID: ${{ secrets.GPG_PRIVATE_ID }}
        run: |
          gpg --batch --import <(echo "$GPG_PRIVATE_KEY")
          git config --global commit.gpgsign true
          git config --global user.name "kudo-sync-bot"
          git config --global user.email "auto-sync@kudoai.com"
          git config --global user.signingkey "$GPG_PRIVATE_ID"

      - name: Push changes to KudoAI/perplexity-omnibox
        run: |
          cd ${{ github.workspace }}/KudoAI/perplexity-omnibox
          git add . && git commit -n -m "$ESCAPED_MSG ↞ [auto-sync from https://github.com/adamlui/ai-web-extensions/tree/main/perplexity-omnibox]" || true
          git pull --rebase
          git push
